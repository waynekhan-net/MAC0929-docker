name: Build

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main

jobs:
  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - id: set-parameters
        run: |
          echo "SONAR_VERBOSE=true" >> "$GITHUB_OUTPUT"
      - name: sonarqube-scan-action
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
          SONAR_PROJECTKEY: ${{ steps.set-parameters.outputs.SONAR_PROJECTKEY }}
        with:
          args: >
            "-Dsonar.verbose=${{ env.SONAR_VERBOSE }}"

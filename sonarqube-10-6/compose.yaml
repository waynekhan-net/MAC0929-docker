---
services:
  sonarqube-10-6:
    container_name: sonarqube-10-6
    depends_on:
      - sonarqube-10-6-postgres
    image: sonarqube:10.6-enterprise
    environment:
      - SONAR_JDBC_URL=jdbc:postgresql://sonarqube-10-6-postgres/sonarqube?currentSchema=public
      - SONAR_JDBC_USERNAME=sonar
    stop_grace_period: 3600s
    ports:
      - 9000:9000
    volumes:
      - ./conf:/opt/sonarqube/conf
      - ./data:/opt/sonarqube/data
      - ./extensions:/opt/sonarqube/extensions
      - ./logs:/opt/sonarqube/logs

  sonarqube-10-6-postgres:
    container_name: sonarqube-10-6-postgres
    image: postgres:17
    environment:
      - POSTGRES_DB=sonarqube
      - POSTGRES_HOST_AUTH_METHOD=trust
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=sonar
    volumes:
      - var-lib-postgresql-data:/var/lib/postgresql/data

volumes:
  var-lib-postgresql-data:

---
services:
  sonarqube-9-openldap:
    container_name: sonarqube-9-openldap
    image: osixia/openldap:1.5.0

  sonarqube-9-phpldapadmin:
    container_name: sonarqube-9-phpldadmin
    depends_on:
      - sonarqube-9-openldap
    image: osixia/phpldapadmin:0.9.0
    ports:
      - 19001:443  # https://localhost:19001
    environment:
      - PHPLDAPADMIN_LDAP_HOSTS=sonarqube-9-openldap

  sonarqube-9:
    container_name: sonarqube-9
    depends_on:
      - sonarqube-9-openldap
      - sonarqube-9-postgres
    image: sonarqube:9.9.9-enterprise
    environment:
      - SONAR_JDBC_URL=jdbc:postgresql://sonarqube-9-postgres/sonarqube?currentSchema=public
      - SONAR_JDBC_USERNAME=sonar

      # LDAP config

      - SONAR_SECURITY_REALM=LDAP
      - LDAP_URL=ldap://sonarqube-9-openldap:389
      - LDAP_BINDDN=cn=admin,dc=example,dc=org
      - LDAP_REALM=example.org
      - LDAP_USER_BASE_DN=cn=employees,dc=example,dc=org

      # [LDAP] anchor mapping

      - LDAP_USER_BASEDN=cn=employees,dc=example,dc=org
      - LDAP_USER_REQUEST=(&(objectClass=inetOrgPerson)(uid={login}))

      # [LDAP] group mapping

      - LDAP_GROUP_BASEDN=dc=example,dc=org
      - LDAP_GROUP_REQUEST=(&(objectClass=groupofUniqueNames)(uniqueMember={dn}))
      - LDAP_GROUP_IDATTRIBUTE=cn
    stop_grace_period: 3600s
    ports:
      - 19000:9000
    volumes:
      - ./conf:/opt/sonarqube/conf
      - ./data:/opt/sonarqube/data
      - ./extensions:/opt/sonarqube/extensions
      - ./logs:/opt/sonarqube/logs
  
  sonarqube-9-postgres:
    container_name: sonarqube-9-postgres
    image: postgres:15
    environment:
      - POSTGRES_DB=sonarqube
      - POSTGRES_HOST_AUTH_METHOD=trust
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=sonar
    volumes:
      - var-lib-postgresql-data:/var/lib/postgresql/data

volumes:
  var-lib-postgresql-data:

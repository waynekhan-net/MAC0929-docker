---
services:
  sonarqube-9-mcp:
    container_name: sonarqube-9-mcp
    depends_on:
      - sonarqube-9-ngrok
    image: mcp/sonarqube:latest
    environment:
      SONARQUBE_HTTP_HOST: 0.0.0.0
      SONARQUBE_TOKEN: ${SONAR_TOKEN}
      SONARQUBE_TRANSPORT: http
      SONARQUBE_URL: ${SONAR_HOST_URL}
    ports:
      - 8080:8080

  sonarqube-9:
    container_name: sonarqube-9
    depends_on:
      - sonarqube-9-postgres
    image: sonarqube:9.9.9-enterprise
    environment:
      - SONAR_JDBC_URL=jdbc:postgresql://sonarqube-9-postgres/sonarqube?currentSchema=public
      - SONAR_JDBC_USERNAME=sonar
    stop_grace_period: 3600s
    ports:
      - 19000:9000
    volumes:
      - ./conf:/opt/sonarqube/conf
      - ./data:/opt/sonarqube/data
      - ./extensions:/opt/sonarqube/extensions
      - ./logs:/opt/sonarqube/logs
  
  sonarqube-9-ngrok:
    container_name: sonarqube-9-ngrok
    depends_on:
      - sonarqube-9
    image: ngrok/ngrok:3
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    command:
      - "start"
      - "sonarqube"
      - "--config"
      - "/etc/ngrok.yml"
    ports:
      - 4040:4040
    volumes:
      - ./ngrok.yml:/etc/ngrok.yml

  sonarqube-9-postgres:
    container_name: sonarqube-9-postgres
    image: postgres:15
    environment:
      - POSTGRES_DB=sonarqube
      - POSTGRES_HOST_AUTH_METHOD=trust
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=sonar
    volumes:
      - var-lib-postgresql-data:/var/lib/postgresql/data

  sonarqube-9-vmagent:
    container_name: sonarqube-9-vmagent
    depends_on:
      - sonarqube-9
    image: victoriametrics/vmagent:v1.93.15
    command:
      - "--promscrape.config=/etc/prometheus/prometheus.yml"
      - "--remoteWrite.url=http://host.docker.internal:8428/api/v1/write"
    volumes:
      - ./vmagent.yaml:/etc/prometheus/prometheus.yml
      - vmagentdata:/vmagentdata

volumes:
  var-lib-postgresql-data:
  vmagentdata:

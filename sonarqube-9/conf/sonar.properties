ldap.url=ldap://host.docker.internal:389
ldap.bindDn=cn=admin,dc=example,dc=org
ldap.bindPassword={aes-gcm}Fs82nLYiEvViw6P8+WUI7NivXL6WOI9hZxb9qM0DmdGk

# LDAP user mapping
ldap.user.baseDn=cn=employees,dc=example,dc=org
ldap.user.request=(&(objectClass=inetOrgPerson)(uid={login}))

# LDAP group sync
ldap.group.baseDn=dc=example,dc=org
